name: Minimum version tests

on:
  push:
    branches:
      - main
      - 'stable/**'
  pull_request:
    branches:
      - main
      - 'stable/**'

jobs:
  tests:
    name: minimum version tests (${{ matrix.os }}, ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      max-parallel: 4
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10"]
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies (minimum versions)
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install extremal-python-dependencies~=0.1.0
          pip install "tox==$(extremal-python-dependencies get-tox-minversion)"
          extremal-python-dependencies pin-dependencies-to-minimum --inplace
      - name: Bootstrap OpenMP-capable compiler (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          brew install llvm libomp
          LLVM_PREFIX="$(brew --prefix llvm)"
          OMP_PREFIX="$(brew --prefix libomp)"
          {
            echo "CC=${LLVM_PREFIX}/bin/clang"
            echo "CXX=${LLVM_PREFIX}/bin/clang++"
            echo "LDFLAGS=-L${LLVM_PREFIX}/lib -L${OMP_PREFIX}/lib -Wl,-rpath,${LLVM_PREFIX}/lib"
            echo "CPPFLAGS=-I${LLVM_PREFIX}/include -I${OMP_PREFIX}/include"
          } >> "$GITHUB_ENV"
      - name: Test using tox environment
        run: |
          tox -e py,notebook --parallel --parallel-no-spinner
